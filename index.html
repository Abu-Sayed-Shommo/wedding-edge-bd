<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আপনার নাম | Wedding Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2000');
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body class="bg-stone-50">

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-xl font-bold serif tracking-tighter text-stone-800 underline decoration-stone-300">Wedding Edge</div>
        <div class="space-x-6 text-xs uppercase tracking-widest text-stone-600 font-semibold">
            <a href="#portfolio" class="hover:text-stone-900">Portfolio</a>
            <a href="#contact" class="hover:text-stone-900">Contact</a>
        </div>
    </nav>

    <header class="hero-section h-[70vh] flex items-center justify-center text-center text-white">
        <div>
            <h1 class="text-5xl md:text-6xl serif mb-4">Capturing Pure Emotions</h1>
            <p class="text-lg tracking-widest font-light italic">Wedding & Lifestyle Photographer in Dhaka</p>
        </div>
    </header>

    <section id="portfolio" class="py-20 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl serif text-center mb-12">Featured Work</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="overflow-hidden bg-stone-200 aspect-[4/5]">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=800" class="w-full h-full object-cover hover:scale-105 transition duration-500">
            </div>
            <div class="overflow-hidden bg-stone-200 aspect-[4/5]">
                <img src="https://images.unsplash.com/photo-1519225495810-75123122152b?q=80&w=800" class="w-full h-full object-cover hover:scale-105 transition duration-500">
            </div>
            <div class="overflow-hidden bg-stone-200 aspect-[4/5]">
                <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?q=80&w=800" class="w-full h-full object-cover hover:scale-105 transition duration-500">
            </div>
        </div>
    </section>

    <footer id="contact" class="bg-stone-900 text-stone-300 py-16 px-6 text-center">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-2xl text-white serif mb-4">Get In Touch</h2>
            <p class="mb-8 font-light">আপনার সাথে কাজ করতে পেরে আমরা আনন্দিত হবো। বুকিংয়ের জন্য আজই যোগাযোগ করুন।</p>
            <div class="text-lg text-stone-100 font-semibold mb-2">📞 +880 1675-228167-</div>
            <div class="text-stone-400 mb-10">Dhaka, Bangladesh</div>
            
            <div class="pt-10 border-t border-stone-800 text-[10px] uppercase tracking-widest">
                &copy; 2026 Wedding Edge | All Rights Reserved
            </div>
        </div>
    </footer>

</body>
</html>
